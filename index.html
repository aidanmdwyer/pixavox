<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixavox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="pixel-grid">
    <div class="pixel-row">
        <div class="pixel"></div>
        <div class="pixel pixel-disabled" style="background-color: #999;"></div>
        <div class="pixel"></div>
    </div>
    <div class="pixel-row">
        <div class="pixel pixel-disabled" style="background-color: #777;"></div>
        <div class="pixel" style="background-color: red;"></div>
        <div class="pixel" style="background-color: red;"></div>
    </div>
    <div class="pixel-row">
        <div class="pixel pixel-disabled" style="background-color: red;"></div>
        <div class="pixel"></div>
        <div class="pixel pixel-disabled"></div>
    </div>
</div>
</body>
</html>
